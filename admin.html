<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CookLog — Редактор</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

  <!-- Auth screen -->
  <div class="auth-screen" id="auth-screen">
    <div class="auth-card">
      <span class="auth-icon">🔑</span>
      <h2 class="auth-title">Вход</h2>
      <p class="auth-subtitle">Эта страница только для тебя</p>
      <input type="password" class="auth-input" id="password-input" placeholder="Пароль" autocomplete="current-password" />
      <p class="auth-error hidden" id="auth-error">Неверный пароль</p>
      <button class="btn-primary" id="auth-btn">Войти</button>
    </div>
  </div>

  <!-- Category manager modal -->
  <div class="cat-modal-overlay hidden" id="cat-modal">
    <div class="cat-modal-box">
      <h3 class="cat-modal-title" id="cat-modal-title">Категории</h3>
      <div class="cat-list" id="cat-list"></div>
      <div class="cat-add-row">
        <input type="text" class="cat-add-input" id="new-cat-input" placeholder="Новая категория…" />
        <button class="btn-primary btn-sm" id="cat-add-btn">+ Добавить</button>
      </div>
      <button class="btn-secondary btn-sm" id="cat-close-btn" style="align-self:flex-end">Готово</button>
    </div>
  </div>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🍲</span>
        <span class="logo-text">CookLog</span>
      </div>
      <nav class="header-nav">
        <a href="index.html" class="nav-link">← Все рецепты</a>
        <span class="nav-link active" id="header-mode-label">Редактор</span>
      </nav>
    </div>
  </header>

  <div class="admin-main hidden" id="admin-main">
    <div class="main" style="max-width:1100px">

      <!-- Recipe list section -->
      <div class="admin-header">
        <h1 class="admin-title">Мои рецепты</h1>
        <div class="admin-actions">
          <button class="btn-primary" id="new-recipe-btn">+ Новый рецепт</button>
        </div>
      </div>

      <div class="recipes-grid" id="admin-recipes-grid" style="margin-bottom:48px">
        <div class="loading">Загружаем рецепты…</div>
      </div>

      <!-- Form section (hidden until new/edit) -->
      <div id="form-section" class="hidden">
        <div class="admin-header">
          <h2 class="admin-title" id="form-title">Новый рецепт</h2>
          <div class="admin-actions">
            <button class="btn-secondary" id="clear-btn">Очистить</button>
            <button class="btn-secondary" id="cancel-btn">← К списку</button>
            <button class="btn-danger" id="delete-btn" style="display:none">🗑 Удалить</button>
            <button class="btn-primary" id="save-btn">Сохранить рецепт</button>
          </div>
        </div>

        <div class="admin-grid">
          <!-- LEFT COL -->
          <div class="admin-col">

            <div class="field-group">
              <label class="field-label">Название <span class="required">*</span></label>
              <input type="text" class="field-input" id="f-title" placeholder="Паста карбонара…" />
            </div>

            <!-- Type (custom categories) -->
            <div class="field-group">
              <label class="field-label">Тип блюда</label>
              <div class="field-row" style="flex-wrap:nowrap">
                <select class="field-select" id="f-type" style="flex:1">
                  <option value="">— не указано —</option>
                </select>
                <button class="btn-manage" data-group="type">⚙</button>
              </div>
            </div>

            <!-- Method (custom categories) -->
            <div class="field-group">
              <label class="field-label">Способ готовки</label>
              <div class="field-row" style="flex-wrap:nowrap">
                <select class="field-select" id="f-method" style="flex:1">
                  <option value="">— не указано —</option>
                </select>
                <button class="btn-manage" data-group="method">⚙</button>
              </div>
            </div>

            <div class="field-row">
              <div class="field-group" style="flex:1">
                <label class="field-label">Время (мин)</label>
                <input type="number" class="field-input" id="f-time" min="1" max="999" placeholder="30" />
              </div>
              <div class="field-group" style="flex:1">
                <label class="field-label">Источник</label>
                <input type="text" class="field-input" id="f-source-label" placeholder="Название / автор" />
              </div>
            </div>

            <div class="field-group">
              <label class="field-label">Ссылка на источник</label>
              <input type="url" class="field-input" id="f-source-url" placeholder="https://…" />
            </div>

            <div class="field-group">
              <label class="field-label">Ингредиенты <span class="field-hint">— по одному на строку</span></label>
              <textarea class="field-textarea" id="f-ingredients" rows="6"
                placeholder="Яйцо — 2 шт&#10;Мука — 200 г&#10;Молоко — 1 стакан"></textarea>
              <div class="parsed-tags-preview" id="parsed-tags-preview"></div>
            </div>

            <div class="field-group">
              <label class="field-label">Приготовление <span class="field-hint">— каждый шаг с новой строки</span></label>
              <textarea class="field-textarea" id="f-steps" rows="7"
                placeholder="Смешать яйца с мукой&#10;Добавить молоко и соль&#10;Жарить на среднем огне"></textarea>
            </div>

          </div><!-- /LEFT COL -->

          <!-- RIGHT COL -->
          <div class="admin-col">

            <div class="field-group">
              <label class="field-label">Фото <span class="field-hint">— URL (необязательно)</span></label>
              <input type="url" class="field-input" id="f-image" placeholder="https://…" />
              <div class="image-preview hidden" id="image-preview">
                <img src="" alt="Превью" id="preview-img" />
              </div>
            </div>

            <div class="field-group">
              <label class="field-label">Эмодзи <span class="field-hint">— если нет фото</span></label>
              <div class="emoji-picker">
                <input type="text" class="field-input field-emoji" id="f-emoji" maxlength="4" placeholder="🍽️" />
                <div class="emoji-suggestions" id="emoji-suggestions"></div>
              </div>
            </div>

            <!-- Tags section -->
            <div class="field-group">
              <label class="field-label">Теги / Ингредиенты</label>
              <div class="tags-chips-display" id="tags-chips-display"></div>
              <div class="tags-input-row">
                <input type="text" class="field-input" id="tag-input" placeholder="Добавить тег и Enter…" />
                <button class="btn-secondary btn-sm" id="tag-add-btn">+ Тег</button>
              </div>
              <div class="saved-tags-label">Из прошлых рецептов:</div>
              <div class="saved-tags-wrap" id="saved-tags-wrap"></div>
            </div>

            <!-- Card preview -->
            <div class="field-group">
              <label class="field-label">Превью карточки</label>
              <div class="card-preview">
                <div class="card-image-placeholder" id="preview-placeholder">🍽️</div>
                <img class="card-image hidden" id="preview-img-card" src="" alt="" />
                <div class="card-body">
                  <div class="card-meta" id="preview-meta"></div>
                  <div class="card-title" id="preview-title">Название рецепта</div>
                  <div class="card-tags" id="preview-tags"></div>
                </div>
              </div>
            </div>

          </div><!-- /RIGHT COL -->
        </div><!-- /admin-grid -->

        <p class="save-status hidden" id="save-status"></p>

      </div><!-- /form-section -->

    </div>
  </div><!-- /admin-main -->

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
